<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfa Yapay Zeka - Bayram Afişi Oluşturucu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050510;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
        }

        /* Instagram karesi 1080x1080 */
        .poster {
            width: 1080px;
            height: 1080px;
            background-image: url('file:///C:/Users/erkin/.gemini/antigravity/brain/2f7f9a93-b39c-4b01-9b26-18c91e17d207/temiz_ciftar_arkaplan_1774167586325.png');
            background-size: cover;
            background-position: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Yazi asagi yanasik */
            align-items: center;
            text-align: center;
            color: white;
            overflow: hidden;
            border-radius: 4px; /* Opsiyonel */
        }

        /* Yazıların kolay okunması için şık koyu degrade */
        .dark-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background: linear-gradient(to top, rgba(0, 0, 15, 0.95) 0%, rgba(10, 5, 30, 0.8) 30%, transparent 100%);
            z-index: 1;
        }

        /* Content container */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            padding-bottom: 60px; /* Alttan bosluk */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. "İyi Bayramlar" */
        h1.main-title {
            font-family: 'Cinzel', serif;
            font-size: 90px;
            font-weight: 700;
            color: #ffd700; /* Altin sarisi */
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 3px 3px 5px rgba(0,0,0,0.9);
            margin: 0 0 10px 0;
            line-height: 1;
        }

        /* 2. "Ramazan Bayramınız Kutlu Olsun" */
        h2.sub-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 30px;
            letter-spacing: 2px;
            margin: 0 0 25px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            color: #e0e0e0;
        }

        /* 3. Ayraç çizgisi */
        .separator {
            width: 400px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            margin: 0 auto 30px auto;
            position: relative;
        }

        .separator::after {
            content: '✦';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 5, 30, 0.9); /* Arka plan rengine uymasi icin */
            padding: 0 20px;
            color: #ffd700;
            font-size: 24px;
        }

        /* 4. "ALFA YAPAY ZEKA" */
        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 50px;
            letter-spacing: 4px;
            color: #ffffff;
            margin: 0 0 15px 0;
            text-shadow: 0 0 20px rgba(0, 195, 255, 0.8), 2px 2px 5px black;
        }

        /* 5. "www.alfayapayzeka.com" */
        .url-short {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 42px;
            color: #00e5ff; /* Fütüristik mavi/cyan */
            margin: 0 0 5px 0;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6), 2px 2px 5px black;
        }

        /* 6. "https://www.alfayapayzeka.com" */
        .url-full {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 26px;
            color: #b0c4de;
            margin: 0 0 40px 0;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px black;
        }

        /* 7. Sosyal Medya İkonları */
        .social-icons {
            display: flex;
            gap: 30px;
        }

        .social-icons i {
            font-size: 40px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        /* 8. Sağ Alt Köşe AI Dünya İkonu */
        .ai-globe-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            background: rgba(0, 229, 255, 0.05); /* cok hafif background */
        }

        .ai-globe-container i.fa-globe {
            font-size: 65px;
            color: #00e5ff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
            position: absolute;
        }

        .ai-globe-container .ai-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: #ffffff;
            z-index: 2;
            text-shadow: 0 0 5px black, 0 0 10px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        /* Açıklama alanı formülü */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 20px;
            font-family: monospace;
            border-radius: 8px;
            font-size: 16px;
            border: 1px solid #00ff00;
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- Instagram Boyutunda Tam Afiş -->
    <div class="poster">
        
        <!-- Zemini okunabilir yapan siyahlık -->
        <div class="dark-overlay"></div>
        
        <!-- YAZILAR VE İKONLAR -->
        <div class="content">
            
            <!-- 1. Ana Başlık -->
            <h1 class="main-title">İyi Bayramlar</h1>
            
            <!-- 2. Alt Metin -->
            <h2 class="sub-title">Ramazan Bayramınız Kutlu Olsun</h2>
            
            <!-- 3. Şık ayrım figürü -->
            <div class="separator"></div>
            
            <!-- 4. ALFA YAPAY ZEKA -->
            <div class="brand-name">ALFA YAPAY ZEKA</div>
            
            <!-- 5. www.alfayapayzeka.com -->
            <div class="url-short">www.alfayapayzeka.com</div>
            
            <!-- 6. https://www.alfayapayzeka.com -->
            <div class="url-full">https://www.alfayapayzeka.com</div>
            
            <!-- 7. Linkedin, Facebook, Instegram Logoları -->
            <div class="social-icons">
                <i class="fab fa-linkedin-in"></i>
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-instagram"></i>
            </div>
            
        </div>
        
        <!-- 8. Sağ alt köşe "Dünya içinde AI" -->
        <div class="ai-globe-container">
            <i class="fas fa-globe"></i>
            <span class="ai-text">AI</span>
        </div>
        
    </div>

</body>
</html>
